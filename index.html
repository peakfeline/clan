<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Кланы</title>
    <style>
        body {
            background-color: #000000;
            background-image: 
                linear-gradient(rgba(140, 20, 252, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(140, 20, 252, 0.15) 1px, transparent 1px);
            background-size: 40px 40px;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            animation: moveGrid 4s linear infinite;
        }
        @keyframes moveGrid {
            from { background-position: 0 0; }
            to { background-position: 40px 40px; }
        }

        h1 {
            text-align: center;
            color: #ffff00;
            text-transform: uppercase;
        }
        .places-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1000px;
            margin: 40px auto;
        }
        .place-card {
            background: #000000;
            border: 3px solid #ffffff;
            border-radius: 4px;
            padding: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            height: 110px; 
            display: flex;
            align-items: flex-start;
            gap: 12px;
            box-sizing: border-box;
        }
        .place-card:hover {
            transform: scale(1.03);
            box-shadow: 0 0 15px rgba(255, 255, 0, 0.6);
            border-color: #ffff00;
        }
        .place-card img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border: 2px solid #ffffff;
            flex-shrink: 0;
        }
        .card-content {
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: space-between;
            flex-grow: 1;
        }
        .place-card h3 {
            color: #ffff00;
            margin: 0;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .place-card p {
            margin: 2px 0 0 0;
            font-size: 12px;
            color: #cccccc;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #000000;
            border: 4px solid #ffffff;
            max-width: 600px;
            width: 90%;
            padding: 25px;
            border-radius: 4px;
            position: relative;
            box-shadow: 0 0 30px rgba(140, 20, 252, 0.8);
        }
        .modal-body {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            margin-top: 15px;
        }
        .modal-content img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border: 2px solid #ffffff;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .modal-text {
            flex-grow: 1;
        }
        .modal-content {
            background: #000000;
            border: 4px solid #ffffff;
            max-width: 600px;
            width: 90%;
            padding: 40px 25px 25px 25px;
            border-radius: 4px;
            position: relative;
            box-shadow: 0 0 30px rgba(140, 20, 252, 0.8);
        }
        .close-btn {
            position: absolute;
            top: 5px; 
            right: 21px;
            font-size: 16px;
            color: #ffffff;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            
            border: 2px solid #ffffff;
            padding: 4px 10px;
            border-radius: 4px;
            background: #000000;
            
            transition: all 0.2s ease;
        }
        .close-btn:hover {
            border-color: #ffff00;
            color: #ffff00;
            box-shadow: 0 0 10px rgba(255, 255, 0, 0.6);
            transform: scale(1.05);
        }
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            margin-top: 8px;
            border: 1px solid;
        }
        .status-союзник { color: #00ff00; border-color: #00ff00; background: rgba(0, 255, 0, 0.1); }
        .status-мир { color: #00ffff; border-color: #00ffff; background: rgba(0, 255, 255, 0.1); }
        .status-нейтралитет { color: #ffffff; border-color: #ffffff; background: rgba(255, 255, 255, 0.1); }
        .status-враг { color: #ff8800; border-color: #ff8800; background: rgba(255, 136, 0, 0.1); }
        .status-война { color: #ff0000; border-color: #ff0000; background: rgba(255, 0, 0, 0.1); }

        #modalStatus {
            margin-bottom: 15px;
        }

    </style>
</head>
<body>

    <h1>Кланы</h1>
    

    <div class="places-grid" id="placesContainer"></div>
    

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <span class="close-btn" id="closeBtn">[ X ]</span>
            
            <div class="modal-body">
                <img id="modalImg" src="" alt="">
                
                <div class="modal-text">
                    <h2 id="modalTitle" style="color: #ffff00; text-align: left; margin-top: 0;"></h2>
                    <div id="modalStatus"></div> 
                    <p id="modalDesc" style="margin-bottom: 0; line-height: 1.5;"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const placesDatabase = [
            {
                title: "С.О.В.Е.Т",
                image: "img/sovet.jpg",
                status: "Нейтралитет",
                shortDesc: "Союз 12 кланов.",
                fullDesc: `В их состав входят: КПРС, Культ воды, Emprire of the Golden eye, КЦЛО, Пантеон Отражений, Церквь Арканиум, Джентельмены, ИИ, Nebula, Ростовская мафия, Ф.Е.Н.И.К.С, Ферракс Рейх.
                
                Цель: Урегулирования конфликтов и решения проблем глобального характера.`
            },
            {
                title: "Альянс Клевера",
                image: "img/clover.jpg", 
                status: "Нейтралитет",
                shortDesc: "Союз 5 кланов",
                fullDesc: `В их состав входят: Emprire of the Golden eye, Культ воды, Люркерианство, ИИ, Sll- ебаклюи.

                Цель: Развитие и защита общих интересов.`
            },
            {
                title: "Церковь Арканиум",
                image: "img/arkanium.jpg",
                status: "Нейтралитет",
                shortDesc: "фанатики",
                fullDesc: `Глава: konsekkir.
                Участники: konsekkir, Spiral_Emperor, chaos_6669_92403, z1r3ks33, morkov, Sakyursa_228, Losyash_VII, Wizard_lizard32, Snakez, SneakXYZ, MorfMonsterss, z1r3ks33, dyrundo4ka.

                Рекруты: armanska, Artem574, Farmir, fofrook123, mr_hat2, splahhhh, klmn77, lebz1, altgreed, DedPol, legend112, Higuruma, Hill1230, cool_metel52, antreno, pababoisas, Toxic, tyteu4, valsor, Vastoria is Peak, Void_a_vorld, GooseTona, pasha228., pomidor04419, TornSplash91781.
                
                Цель: Хз нищим хелпуют и там чето делают доброе.`
            },
            {
                title: "Ф.Е.Н.И.К.С.",
                image: "img/phoenix.jpg",
                status: "Нейтралитет",
                shortDesc: "Хз деф клан",
                fullDesc: `Глава: gokr_dot.
                Участники: gokr_dot, Janez_Trdina, cekorie_ZforZ, bosparoww, mikapoty, mriglobruh, ttvatt (не всё т.к доступа к их дс каналу нет)
                
                Цель: Создать масштабный проект (гигантский подземный город/бункер).`
            },
            {
                title: "КПРС",
                image: "img/kprs.jpg",
                status: "Нейтралитет",
                shortDesc: "Коммунисты",
                fullDesc: `Глава: Ssmoyg.
                Участники: Ssmoyg, KsarP0OL, zera, singalplayer, ItsCers, Ckevutpoh, мб lososi, The_Kvartz, pomamon12345, well_done, Notsh
                
                Цель: Строительство мегапроекта метрополитена в обычном мире и в аду, а также улучшение главного бункера, строительство хабов и систем самообеспечения на станциях метро.`
            },
            {
                title: "Люркерианство",
                image: "img/lyrk.jpg", 
                status: "Нейтралитет",
                shortDesc: "тоже фанатики, ток в машину верят",
                fullDesc: `Глава: Mrak.
                Участники: Mrak, raldi9889, sansnnnnnnnnn, yorimaiOOO, TeaLov1r, galiqus, aqpxc12345, reshot04k4chan, keker22809, DanyXD228, DRENBER4321, grimm..., Kamil04014, kocTRHka, Limottewe, Mark/Mrak2, dalas_glond, rdudgi, sashaaleksandr, Minegosha, iww014_26089, MyXa1826, galv3nix

                Цель: Продвигать технический прогресс, создать идеальный механизм и защищать интересы нейтральных кланов.`
            },
        ];

        const container = document.getElementById('placesContainer');
        
        placesDatabase.forEach(place => {
            const card = document.createElement('div');
            card.className = 'place-card';
            
            const statusClass = 'status-' + place.status.toLowerCase();
            
                        card.innerHTML = `
                <img src="${place.image}" alt="${place.title}">
                <div class="card-content">
                    <h3>* ${place.title}</h3>
                    <p>${place.shortDesc}</p>
                    <div class="status-badge ${statusClass}">• Статус: ${place.status}</div>
                </div>
            `;
            
            card.addEventListener('click', () => {
                document.getElementById('modalTitle').innerText = "* " + place.title;
                document.getElementById('modalDesc').innerText = place.fullDesc;
                
                document.getElementById('modalImg').src = place.image;
                
                const modalStatusDiv = document.getElementById('modalStatus');
                modalStatusDiv.innerHTML = `<div class="status-badge ${statusClass}">• Отношения: ${place.status}</div>`;
                
                document.getElementById('modalOverlay').style.display = 'flex';
            });

            container.appendChild(card);
        });

        document.getElementById('closeBtn').addEventListener('click', () => {
            document.getElementById('modalOverlay').style.display = 'none';
        });
    </script>
</body>
</html>
